<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>H 1.0 Pro Mini App Launcher</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: #101010;
        --line: rgba(215, 175, 84, 0.24);
        --text: #f4efe6;
        --muted: rgba(244, 239, 230, 0.62);
        --accent: #d4af37;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(212, 175, 55, 0.1), transparent 34%),
          linear-gradient(180deg, #070707 0%, #030303 100%);
        color: var(--text);
        font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      .panel {
        width: min(92vw, 420px);
        padding: 28px 24px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(16, 16, 16, 0.98), rgba(8, 8, 8, 0.98));
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }
      .eyebrow {
        margin: 0 0 10px;
        font-size: 12px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--muted);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 30px;
        line-height: 1.1;
        font-weight: 600;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }
      .hint {
        margin-top: 18px;
        font-size: 13px;
      }
      .accent {
        color: var(--accent);
      }
      .error {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 14px;
        background: rgba(128, 32, 32, 0.18);
        border: 1px solid rgba(255, 96, 96, 0.28);
        color: #ffd7d7;
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <p class="eyebrow">Telegram Mini App</p>
      <h1>H 1.0 Pro</h1>
      <p>正在通过 <span class="accent">GitHub Pages</span> 入口跳转到当前可用的 Mini App 页面，请稍候。</p>
      <p class="hint">若未自动跳转，请检查当前入口配置是否已更新为最新预览地址。</p>
      <div id="error" class="error"></div>
    </main>
    <script>
      (() => {
        const targetBase = "https://3000-ij521hq8jeri98iz2bbvf-3cf5c709.us2.manus.computer/";
        const errorNode = document.getElementById("error");

        try {
          const target = new URL(targetBase);
          target.search = window.location.search;
          target.hash = window.location.hash;
          window.location.replace(target.toString());
        } catch (error) {
          if (errorNode) {
            errorNode.style.display = "block";
            errorNode.textContent = "入口跳转失败，请联系维护者更新 GitHub HTML 入口页中的目标地址。";
          }
          console.error("[telegram-miniapp-launcher] redirect failed", error);
        }
      })();
    </script>
  </body>
</html>
